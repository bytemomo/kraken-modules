$schema: "http://json-schema.org/draft-07/schema#"
title: Kraken Module Manifest
type: object
required:
  - id
  - version
  - type
  - description
  - build
  - runtime
  - params
  - findings

allOf:
  - if:
      properties:
        type:
          const: abi
    then:
      required: [abi]
  - if:
      properties:
        type:
          const: container
    then:
      required: [container]
  - if:
      properties:
        type:
          const: grpc
    then:
      required: [grpc]

properties:
  id:
    type: string
    pattern: "^[a-z][a-z0-9_]*$"
    description: Module identifier (lowercase, underscores)

  version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: Semantic version

  type:
    type: string
    enum: [abi, container, grpc]

  description:
    type: string
    maxLength: 256

  build:
    type: object
    required: [system]
    properties:
      system:
        type: string
        enum: [cargo, cmake, docker, go]
      platforms:
        type: array
        items:
          type: string
          enum: [linux-amd64, linux-arm64]
        default: [linux-amd64]

  abi:
    type: object
    description: Required for type=abi
    required: [api, symbol]
    properties:
      api:
        type: string
        enum: [v1, v2]
      symbol:
        type: string

  container:
    type: object
    description: Required for type=container
    properties:
      dockerfile:
        type: string
        default: Dockerfile

  grpc:
    type: object
    description: Required for type=grpc
    required: [service, default_port]
    properties:
      service:
        type: string
      default_port:
        type: integer

  runtime:
    type: object
    required: [protocol]
    properties:
      protocol:
        type: string
        description: Target protocol (mqtt, modbus, ethercat, tls, etc.)
      timeout:
        type: string
        pattern: "^[0-9]+(s|m)$"
        default: "30s"
      memory:
        type: string
        pattern: "^[0-9]+(m|g)$"
        default: "256m"

  params:
    type: object
    description: JSON Schema for module parameters (validated as Draft-7)
    required: [type, properties]
    properties:
      type:
        const: object
      required:
        type: array
        items:
          type: string
      properties:
        type: object
        additionalProperties:
          type: object
          required: [type, description]
          additionalProperties: false
          properties:
            type:
              type: string
              enum: [string, integer, number, boolean, array]
            description:
              type: string
              minLength: 1
            enum:
              type: array
              minItems: 1
              description: Allowed values (exhaustive list)
            examples:
              type: array
              minItems: 1
              description: Example values for documentation
            minimum:
              type: number
              description: Minimum value (integer/number types)
            maximum:
              type: number
              description: Maximum value (integer/number types)
            exclusiveMinimum:
              type: number
            exclusiveMaximum:
              type: number
            minLength:
              type: integer
              minimum: 0
              description: Minimum string length
            maxLength:
              type: integer
              minimum: 0
              description: Maximum string length
            pattern:
              type: string
              description: Regex pattern the string must match
            format:
              type: string
              enum:
                - ipv4
                - ipv6
                - hostname
                - uri
                - file-path
                - duration
                - hex
              description: Semantic format hint for validation
            items:
              type: object
              description: Schema for array element type
              properties:
                type:
                  type: string

  findings:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, severity, description]
      properties:
        id:
          type: string
          pattern: "^[A-Z][A-Z0-9_-]*$"
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        description:
          type: string
