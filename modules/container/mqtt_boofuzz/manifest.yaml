id: mqtt_boofuzz
version: 0.1.1
type: container
description: |
  MQTT protocol fuzzer using boofuzz. Tests CONNECT, PUBLISH, SUBSCRIBE,
  and other MQTT v5 packets with protocol-aware mutations.

build:
  system: docker
  platforms: [linux-amd64]

container:
  dockerfile: Dockerfile

runtime:
  protocol: mqtt
  timeout: 5m
  memory: 512m

params:
  type: object
  required:
    - host
    - port
  properties:
    host:
      type: string
      description: Target MQTT broker host or IP address
      format: hostname
      examples: ["192.168.1.10", "broker.local"]
    port:
      type: integer
      description: Target MQTT broker port
      minimum: 1
      maximum: 65535
    max_iterations:
        type: integer
        description: Number of iterations to run
        minimum: 1
    test_case_index:
      type: string
      description: Test case index or range to fuzz
      pattern: "^[0-9]+(-[0-9]+)?$"
      examples: ["1-100", "42"]
    test_case_name:
      type: string
      description: Name of specific node or test case to fuzz
    sleep_between_cases:
      type: number
      description: Wait time in seconds between test cases
      minimum: 0
    procmon_host:
      type: string
      description: Process monitor host or IP for crash detection
      format: hostname
    procmon_port:
      type: integer
      description: Process monitor port
      minimum: 1
      maximum: 65535
    procmon_start:
      type: string
      description: Command to start the target process via process monitor
    output_dir:
      type: string
      description: Directory for fuzzing output (session DB, logs, FSM graph)
      format: file-path

findings:
  - id: FUZZ-FAIL
    severity: medium
    description: Fuzzing triggered a failure condition in the target
  - id: FUZZ-CRASH
    severity: high
    description: Fuzzing triggered a crash in the target
  - id: FUZZ-COMPLETE
    severity: info
    description: Fuzzing completed without detecting issues
