id: mqtt_replay
version: 0.1.1
type: abi
description: |
  Replays fixed MQTT packet sequences to reproduce known bugs. Takes a hex-encoded
  sequence file as parameter. Finding ID is derived from the sequence file name.

build:
  system: cmake
  platforms: [linux-amd64]

abi:
  api: v1
  symbol: kraken_run

runtime:
  protocol: mqtt
  timeout: 60s
  memory: 64m

params:
  type: object
  required:
    - sequence_num
  properties:
    sequence_num:
      type: integer
      description: Number of replay sequences to execute
      minimum: 1
      examples: [3]
    path0:
      type: string
      description: File path for replay sequence 0 (hex-encoded packets)
      format: file-path
    path1:
      type: string
      description: File path for replay sequence 1
      format: file-path
    path2:
      type: string
      description: File path for replay sequence 2
      format: file-path

findings:
  - id: MQTT-REPLAY
    severity: high
    description: MQTT broker vulnerable to message replay
