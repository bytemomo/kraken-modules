id: mqtt_sys_disclosure
version: 0.1.0
type: abi
description: |
  Checks if subscribing to # also receives $SYS topics, which can leak system
  information (connections, topics, etc.) to attackers with client access.

build:
  system: cmake
  platforms: [linux-amd64]

abi:
  api: v1
  symbol: kraken_run

runtime:
  protocol: mqtt
  timeout: 30s
  memory: 64m

params:
  type: object
  properties:
    username:
      type: string
      description: MQTT username for authenticated connection
    password:
      type: string
      description: MQTT password for authenticated connection
    sys_prefix:
      type: string
      description: Custom $SYS topic prefix to check for disclosure
      examples: ["$SYS", "$SYS/#"]

findings:
  - id: MQTT-SYS-DISCLOSURE
    severity: high
    description: Sensitive information exposed via $SYS topics
