id: tls_version_check
version: 0.1.1
type: abi
description: |
  Summarizes which TLS protocol versions a server accepts by attempting handshakes
  for TLS 1.0-1.3. Severity raised to medium if TLS 1.0/1.1 are accepted.

build:
  system: cmake
  platforms: [linux-amd64]

abi:
  api: v1
  symbol: kraken_run

runtime:
  protocol: tls
  timeout: 30s
  memory: 64m

params:
  type: object
  properties:
    min_version:
      type: string
      description: Minimum TLS version to test (skip versions below this)
      enum: ["1.0", "1.1", "1.2", "1.3"]
      examples: ["1.2"]
    max_version:
      type: string
      description: Maximum TLS version to test (skip versions above this)
      enum: ["1.0", "1.1", "1.2", "1.3"]
      examples: ["1.3"]
    sni:
      type: string
      description: Override SNI hostname sent in TLS ClientHello
      format: hostname
      examples: ["broker.example.com"]

findings:
  - id: TLS-SUPPORT-OVERVIEW
    severity: info
    description: TLS protocol support summary
