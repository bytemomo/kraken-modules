id: cert_inspect
version: 0.1.0
type: abi
description: |
  Inspects the server certificate over TLS and reports common posture issues
  (expiry, weak keys, SHA1, self-signed, SAN/hostname mismatches).

build:
  system: cargo
  platforms: [linux-amd64]

abi:
  api: v1
  symbol: kraken_run

runtime:
  protocol: tls
  timeout: 30s
  memory: 64m

params:
  type: object
  properties:
    tls_insecure:
      type: boolean
      description: Skip TLS certificate verification during connection
    warn_days:
      type: integer
      description: Days before expiry to trigger CERT-EXPIRING finding
      minimum: 1
      maximum: 365
    min_rsa_bits:
      type: integer
      description: Minimum RSA key size in bits
      enum: [1024, 2048, 3072, 4096]
    allow_sha1:
      type: boolean
      description: Suppress CERT-SHA1 finding for SHA-1 signatures
    disallow_self_signed:
      type: boolean
      description: Report self-signed certificates as findings
    match_hostname:
      type: boolean
      description: Check certificate CN/SAN against target hostname
    require_san:
      type: boolean
      description: Require Subject Alternative Name extension
    require_server_auth:
      type: boolean
      description: Require Server Authentication EKU extension

findings:
  - id: CERT-EXPIRED
    severity: critical
    description: Certificate has expired
  - id: CERT-EXPIRING
    severity: medium
    description: Certificate expiring soon
  - id: CERT-SELFSIGNED
    severity: medium
    description: Self-signed certificate
  - id: CERT-SHA1
    severity: high
    description: Certificate uses weak SHA1 signature
  - id: CERT-WEAKKEY
    severity: high
    description: Certificate uses weak key size
  - id: CERT-HOSTNAME
    severity: high
    description: Hostname mismatch
  - id: CERT-NOSAN
    severity: medium
    description: Missing Subject Alternative Name
  - id: CERT-NO-SERVER-AUTH
    severity: medium
    description: Certificate lacks server authentication EKU
